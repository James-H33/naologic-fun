<div class="dropdown-list" [style.width]="width()">
  @for (item of items(); track item.id) {
    <div
      class="dropdown-list-item"
      [class.dropdown-list-item--active]="item.id === selectedItem()"
      (click)="selectionChange.emit(item)"
      (keydown.enter)="selectionChange.emit(item)"
      role="button"
      tabindex="0"
    >
      {{ item.title }}
    </div>
  }
</div>
