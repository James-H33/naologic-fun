@for (workOrder of workOrders(); track workOrder.docId) {
  <div
    class="timeline-item"
    [style.--background-color]="
      workOrderStatusColors[workOrder.data.status].backgroundSecondary || 'gray'
    "
    [style.--border-color]="workOrderStatusColors[workOrder.data.status].border || 'gray'"
    [style.left.px]="workOrderPositionMap()[workOrder.docId]?.left"
    [style.width.px]="workOrderPositionMap()[workOrder.docId]?.width"
    [class.mouse-down]="(isMouseDown$ | async) && draggedWorkOrder()?.docId === workOrder.docId"
    (mouseenter)="onWorkOrderHover(workOrder)"
    (mouseleave)="onWorkOrderHover(null)"
    (mousedown)="onMouseDownWorkOrder($event, workOrder)"
    nlTooltip
    [nlTooltipDelay]="600"
    [nlTooltipTemplate]="tooltipTemplate"
    nlDropdown
    [nlDropdownTemplate]="dropdownTemplate"
    nlDropdownTriggerType="contextmenu"
    (nlDropdownOpened)="activeDropdownWorkorder.set(workOrder)"
  >
    <div class="timeline-item-content">
      <span class="timeline-item-name">
        {{ workOrder.data.name }}
      </span>

      <nl-status [status]="workOrder.data.status" class="timeline-item-status"> </nl-status>
    </div>

    <ng-template #tooltipTemplate>
      <span>{{ workOrder.data.name }}</span> <span class="tooltip-separator">|</span>

      <span>
        {{ workOrder.data.startDate | date: 'MMM d' }} -
        {{ workOrder.data.endDate | date: 'MMM d, yyyy' }}
      </span>
    </ng-template>

    <span
      class="nl-timeline-item-handle nl-timeline-item-handle--left"
      (mousedown)="onDragHandleMouseDown(workOrder, 'left')"
    ></span>
    <span
      class="nl-timeline-item-handle nl-timeline-item-handle--right"
      (mousedown)="onDragHandleMouseDown(workOrder, 'right')"
    ></span>
  </div>
}

<ng-template #dropdownTemplate>
  <div class="cdk-overlay-pane-default nl-timeline-context-menu">
    <nl-dropdown-list
      [items]="dropdownItems"
      (selectionChange)="onContextMenuAction($event)"
    ></nl-dropdown-list>
  </div>
</ng-template>
